# RemiseCMR — reverse proxy Nginx → Next.js (127.0.0.1:3000)
# Termine le TLS et ajoute HSTS. Les autres en-têtes de sécurité (CSP,
# X-Frame-Options, X-Content-Type-Options, Referrer-Policy, Permissions-Policy)
# sont déjà posées par Next.js (next.config.mjs) — on ne les duplique pas ici.
#
# Installation :
#   sudo cp deploy/nginx/remisecmr.conf /etc/nginx/sites-available/remisecmr
#   sudo ln -s /etc/nginx/sites-available/remisecmr /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d remisecmr.example.qc.ca   # remplit les blocs ssl_*
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name remisecmr.example.qc.ca;
    # Tout le trafic HTTP est redirigé vers HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name remisecmr.example.qc.ca;

    # --- TLS (certbot / Let's Encrypt remplit ces chemins) ---
    ssl_certificate     /etc/letsencrypt/live/remisecmr.example.qc.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/remisecmr.example.qc.ca/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # HSTS : forcer HTTPS côté navigateur pendant 2 ans.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Imports CSV / Excel des listes (élèves, casiers).
    client_max_body_size 12m;

    # Journaux dédiés.
    access_log /var/log/nginx/remisecmr.access.log;
    error_log  /var/log/nginx/remisecmr.error.log;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Support du WebSocket / HMR éventuel.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
